<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="AI Game Night Connect Four GUI preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#8ea4c4" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="540" fill="url(#bg)"/>

  <rect x="110" y="60" rx="18" ry="18" width="740" height="450" fill="#ffffff" filter="url(#shadow)"/>

  <text x="140" y="104" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="34" fill="#1f2a44" font-weight="700">
    AI Game Night - Connect Four
  </text>

  <text x="140" y="128" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="16" fill="#4a5670" font-weight="600">
    player_red (greedy)  vs  player_yellow (random)
  </text>

  <rect x="140" y="144" rx="10" ry="10" width="680" height="42" fill="#edf3ff"/>
  <text x="160" y="172" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="20" fill="#2b3a5a" font-weight="600">
    Turn 14: player_red played {'type': 'drop', 'column': 3}
  </text>

  <rect x="294" y="195" rx="14" ry="14" width="352" height="304" fill="#2f6fb0"/>

  <g transform="translate(294, 195)">
    <!-- row 0 (top) -->
    <circle cx="32"  cy="32"  r="20" fill="#e7edf6"/>
    <circle cx="80"  cy="32"  r="20" fill="#e7edf6"/>
    <circle cx="128" cy="32"  r="20" fill="#e7edf6"/>
    <circle cx="176" cy="32"  r="20" fill="#e7edf6"/>
    <circle cx="224" cy="32"  r="20" fill="#e7edf6"/>
    <circle cx="272" cy="32"  r="20" fill="#e7edf6"/>
    <circle cx="320" cy="32"  r="20" fill="#e7edf6"/>

    <!-- row 1 -->
    <circle cx="32"  cy="80"  r="20" fill="#e7edf6"/>
    <circle cx="80"  cy="80"  r="20" fill="#e7edf6"/>
    <circle cx="128" cy="80"  r="20" fill="#e7edf6"/>
    <circle cx="176" cy="80"  r="20" fill="#e7edf6"/>
    <circle cx="224" cy="80"  r="20" fill="#e7edf6"/>
    <circle cx="272" cy="80"  r="20" fill="#e7edf6"/>
    <circle cx="320" cy="80"  r="20" fill="#e7edf6"/>

    <!-- row 2 -->
    <circle cx="32"  cy="128" r="20" fill="#e7edf6"/>
    <circle cx="80"  cy="128" r="20" fill="#e7edf6"/>
    <circle cx="128" cy="128" r="20" fill="#e7edf6"/>
    <circle cx="176" cy="128" r="20" fill="#d6483f"/>
    <circle cx="224" cy="128" r="20" fill="#e7edf6"/>
    <circle cx="272" cy="128" r="20" fill="#e7edf6"/>
    <circle cx="320" cy="128" r="20" fill="#e7edf6"/>

    <!-- row 3 -->
    <circle cx="32"  cy="176" r="20" fill="#e7edf6"/>
    <circle cx="80"  cy="176" r="20" fill="#e7edf6"/>
    <circle cx="128" cy="176" r="20" fill="#d6483f"/>
    <circle cx="176" cy="176" r="20" fill="#e8c33b"/>
    <circle cx="224" cy="176" r="20" fill="#e7edf6"/>
    <circle cx="272" cy="176" r="20" fill="#e7edf6"/>
    <circle cx="320" cy="176" r="20" fill="#e7edf6"/>

    <!-- row 4 -->
    <circle cx="32"  cy="224" r="20" fill="#e7edf6"/>
    <circle cx="80"  cy="224" r="20" fill="#e8c33b"/>
    <circle cx="128" cy="224" r="20" fill="#e8c33b"/>
    <circle cx="176" cy="224" r="20" fill="#d6483f"/>
    <circle cx="224" cy="224" r="20" fill="#d6483f"/>
    <circle cx="272" cy="224" r="20" fill="#e7edf6"/>
    <circle cx="320" cy="224" r="20" fill="#e7edf6"/>

    <!-- row 5 (bottom) -->
    <circle cx="32"  cy="272" r="20" fill="#e8c33b"/>
    <circle cx="80"  cy="272" r="20" fill="#d6483f"/>
    <circle cx="128" cy="272" r="20" fill="#d6483f"/>
    <circle cx="176" cy="272" r="20" fill="#d6483f"/>
    <circle cx="224" cy="272" r="20" fill="#e8c33b"/>
    <circle cx="272" cy="272" r="20" fill="#d6483f"/>
    <circle cx="320" cy="272" r="20" fill="#e7edf6"/>
  </g>

  <text x="140" y="495" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="18" fill="#4a5670">
    The matchup label shows which bots are facing off; the board updates live each turn.
  </text>
</svg>
