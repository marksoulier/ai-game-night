<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="AI Game Night Tic-Tac-Toe GUI preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef4ff" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#8ea4c4" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="960" height="540" fill="url(#bg)"/>

  <rect x="110" y="60" rx="18" ry="18" width="740" height="420" fill="#ffffff" filter="url(#shadow)"/>

  <text x="140" y="112" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="34" fill="#1f2a44" font-weight="700">
    AI Game Night - Tic-Tac-Toe
  </text>

  <rect x="140" y="130" rx="10" ry="10" width="680" height="48" fill="#edf3ff"/>
  <text x="160" y="162" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="22" fill="#2b3a5a" font-weight="600">
    Turn 5: player_x played {'type': 'place', 'index': 6}
  </text>

  <g transform="translate(205, 205)">
    <rect x="0" y="0" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="182" y="0" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="364" y="0" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="0" y="102" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="182" y="102" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="364" y="102" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="0" y="204" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="182" y="204" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>
    <rect x="364" y="204" width="166" height="86" rx="8" fill="#f8faff" stroke="#c7d4ea"/>

    <text x="83" y="56" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#e36b4a">O</text>
    <text x="265" y="56" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#7d8799"> </text>
    <text x="447" y="56" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#447ad3">X</text>

    <text x="83" y="158" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#7d8799"> </text>
    <text x="265" y="158" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#447ad3">X</text>
    <text x="447" y="158" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#7d8799"> </text>

    <text x="83" y="260" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#447ad3">X</text>
    <text x="265" y="260" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#7d8799"> </text>
    <text x="447" y="260" text-anchor="middle" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="54" font-weight="700" fill="#e36b4a">O</text>
  </g>

  <text x="140" y="455" font-family="Avenir, Helvetica, Arial, sans-serif" font-size="18" fill="#4a5670">
    Human bots still choose moves in terminal; GUI updates live each turn.
  </text>
</svg>
